<style>
:root {
  --bg:           #0D1B2A;
  --bg2:          #111F30;
  --bg3:          #172638;
  --bg4:          #1E2F42;
  --border:       #253648;
  --border2:      #2E4057;
  --text:         #F4F1E8;
  --text2:        #9AAFC2;
  --text3:        #5A7A96;
  --accent:       #1B6CA8;
  --accent2:      #48CAE4;
  --accent-bg:    rgba(72,202,228,0.10);
  --accent-border:rgba(72,202,228,0.28);
  --cyan:         #48CAE4;
  --blue-light:   #3B8EC4;
  --slate:        #2E4057;
  --sand:         #F4F1E8;
  --green:        #4FC3A1;
  --green-bg:     rgba(79,195,161,0.10);
  --amber:        #E8B84B;
  --red:          #E05A5A;
  --gold:         #E8B84B;
  --mono:         'JetBrains Mono', monospace;
  --sans:         'Inter', sans-serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:var(--sans);font-size:15px;min-height:100vh;line-height:1.6;}

nav {
  position:sticky;top:0;z-index:100;
  background:var(--bg2);
  backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
  padding:0 2rem;height:60px;
}
.nav-logo { font-size:0.95rem;font-weight:600;letter-spacing:-0.01em;display:flex;align-items:center;gap:0.75rem;color:var(--text);text-decoration:none; }
.nav-logo-mark { width:30px;height:30px;border-radius:8px;background:var(--accent-bg);border:1px solid var(--accent-border);display:flex;align-items:center;justify-content:center;flex-shrink:0; }
.nav-badge { background:var(--green-bg);color:var(--green);border:1px solid rgba(79,195,161,0.25);padding:2px 9px;font-size:0.68rem;font-weight:500;border-radius:20px;font-family:var(--mono);display:flex;align-items:center;gap:5px; }
.live-dot { width:6px;height:6px;border-radius:50%;background:var(--green);animation:pulse 2s infinite;flex-shrink:0; }
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}
.gh-link { font-size:0.8rem;color:var(--text2);text-decoration:none;padding:0.4rem 1rem;border:1px solid var(--border2);border-radius:6px;transition:all 0.15s;font-weight:500;display:flex;align-items:center;gap:6px; }
.gh-link:hover { color:var(--text);background:var(--bg3); }
.nav-right { display:flex;align-items:center;gap:0.75rem; }

.palette-group { display:flex;align-items:center;gap:4px;overflow:visible;position:relative; }
.palette-trigger { font-size:0.78rem;color:var(--text2);padding:0.35rem 0.7rem;display:flex;align-items:center;gap:6px;cursor:pointer;user-select:none;border-radius:6px;transition:all 0.15s; }
.palette-trigger:hover { color:var(--text);background:var(--bg3); }
.palette-trigger-dot { width:10px;height:10px;border-radius:50%;background:var(--cyan);flex-shrink:0; }
.palette-trigger-arrow { font-size:0.55rem;color:var(--text3); }
.mode-toggle-wrap { padding:0.35rem 0.6rem;display:flex;align-items:center;gap:5px;cursor:pointer;border-radius:6px;transition:all 0.15s; }
.mode-toggle-wrap:hover { background:var(--bg3); }
.mode-icon { width:12px;height:12px;flex-shrink:0;color:var(--text3); }
.mode-track { width:28px;height:15px;border-radius:8px;background:var(--bg3);border:1px solid var(--border2);position:relative;transition:background 0.2s; }
.mode-thumb { width:11px;height:11px;border-radius:50%;background:var(--cyan);position:absolute;top:1px;left:1px;transition:transform 0.2s; }
.mode-thumb.on { transform:translateX(13px); }
.palette-dropdown { display:none;position:absolute;top:calc(100% + 6px);right:0;min-width:168px;background:var(--bg2);border:1px solid var(--border2);border-radius:8px;z-index:200;overflow:hidden; }
.palette-dropdown.open { display:block; }
.palette-option { display:flex;align-items:center;justify-content:space-between;padding:8px 12px;cursor:pointer;border-bottom:1px solid var(--border);font-size:0.82rem;color:var(--text2);transition:background 0.1s; }
.palette-option:last-child { border-bottom:none; }
.palette-option:hover { background:var(--bg3);color:var(--text); }
.palette-option.active { background:var(--bg3);color:var(--text); }
.palette-option-dot { width:12px;height:12px;border-radius:50%;flex-shrink:0;border:2px solid transparent; }
.palette-option.active .palette-option-dot { border-color:var(--cyan); }

@media(max-width:768px){ .palette-group { display:none; } }

.wrap{max-width:1100px;margin:0 auto;padding:0 24px 80px}

header{padding:52px 0 36px;text-align:center}
.eyebrow{display:inline-flex;align-items:center;gap:8px;font-family:var(--mono);font-size:0.7rem;color:var(--accent2);background:var(--accent-bg);border:1px solid var(--accent-border);letter-spacing:.1em;text-transform:uppercase;margin-bottom:18px;padding:5px 14px;border-radius:20px;}
.eyebrow-dot{width:6px;height:6px;border-radius:50%;background:var(--cyan);animation:pulse 2s ease-in-out infinite;flex-shrink:0;}
h1{font-size:clamp(2.2rem,4vw,3.3rem);font-weight:600;line-height:1.08;letter-spacing:-.03em;color:var(--sand);margin-bottom:12px}
h1 em{font-style:normal;color:var(--cyan)}
.header-sub{font-size:1rem;color:var(--text2);font-weight:400;max-width:460px;margin:0 auto;line-height:1.75;}

.search-section{margin:36px 0 28px}
.search-box{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:22px 24px;transition:border-color .2s}
.search-box:focus-within{border-color:var(--accent2);}
.search-label{display:block;font-size:0.65rem;font-weight:500;color:var(--text3);letter-spacing:.1em;text-transform:uppercase;margin-bottom:10px;font-family:var(--mono)}
.search-row{display:flex;gap:10px;align-items:stretch}
.search-input{flex:1;background:var(--bg3);border:1px solid var(--border2);border-radius:8px;padding:13px 16px;font-family:var(--mono);font-size:0.82rem;color:var(--text);outline:none;transition:border-color .2s;min-width:0}
.search-input::placeholder{color:var(--text3)}
.search-input:focus{border-color:var(--cyan);}
.search-btn{padding:13px 26px;background:var(--accent);color:var(--bg);border:none;border-radius:8px;font-family:var(--sans);font-size:0.85rem;font-weight:500;cursor:pointer;transition:all .2s;white-space:nowrap;display:flex;align-items:center;gap:8px;flex-shrink:0;}
.search-btn:hover{background:var(--blue-light);}
.search-btn:active{transform:scale(.98)}
.search-btn:disabled{background:var(--border2);color:var(--text3);cursor:not-allowed;transform:none}
.search-btn svg{width:15px;height:15px}

.progress-section{display:none;margin-bottom:24px}
.progress-section.visible{display:block}
.progress-card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:18px 22px;}
.progress-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.progress-label{font-family:var(--mono);font-size:0.75rem;color:var(--cyan)}
.progress-count{font-family:var(--mono);font-size:0.75rem;color:var(--text3)}
.progress-bar-bg{height:3px;background:var(--bg4);border-radius:2px;overflow:hidden}
.progress-bar-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--cyan));border-radius:2px;width:0%;transition:width .3s}
.progress-bar-fill.indeterminate{width:35%!important;animation:slide 1.1s ease-in-out infinite}
@keyframes slide{0%{margin-left:-35%}100%{margin-left:100%}}

.summary-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:12px;margin-bottom:24px;animation:fadeUp .35s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.summary-card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:18px;position:relative;overflow:hidden;transition:border-color .2s}
.summary-card::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px}
.summary-card.c-accent::after{background:var(--cyan)}
.summary-card.c-green::after{background:var(--green)}
.summary-card.c-red::after{background:var(--red)}
.summary-card.c-gold::after{background:var(--gold)}
.summary-card:hover{border-color:var(--border2);}
.sc-label{font-size:0.65rem;font-weight:500;color:var(--text3);text-transform:uppercase;letter-spacing:.1em;margin-bottom:8px;font-family:var(--mono)}
.sc-value{font-size:1.75rem;font-weight:600;color:var(--sand);line-height:1;font-family:var(--mono)}
.sc-value.accent{color:var(--cyan)}
.sc-value.gold{color:var(--gold)}
.sc-value.green{color:var(--green)}
.sc-value.red{color:var(--red)}

.issuer-bar{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:13px 18px;margin-bottom:20px;display:flex;align-items:center;gap:12px;animation:fadeUp .35s ease .05s both}
.issuer-tag{font-family:var(--mono);font-size:0.65rem;color:var(--cyan);background:var(--accent-bg);border:1px solid var(--accent-border);padding:3px 10px;border-radius:4px;letter-spacing:.1em;text-transform:uppercase;flex-shrink:0;font-weight:500}
.issuer-addr{font-family:var(--mono);font-size:0.82rem;color:var(--text);word-break:break-all}

.controls-row{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:16px;flex-wrap:wrap;animation:fadeUp .35s ease .1s both}
.view-tabs{display:flex;gap:4px;background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:4px;}
.view-tab{padding:7px 18px;border-radius:5px;font-size:0.82rem;font-weight:500;cursor:pointer;border:none;background:none;color:var(--text3);transition:all .15s;font-family:var(--sans)}
.view-tab:hover{color:var(--text);background:var(--bg3)}
.view-tab.active{background:var(--accent);color:var(--bg);}
.export-btns{display:flex;gap:8px;flex-wrap:wrap}
.export-btn{display:flex;align-items:center;gap:7px;padding:8px 16px;background:var(--bg2);border:1px solid var(--border);border-radius:7px;color:var(--text2);font-size:0.78rem;font-family:var(--sans);font-weight:500;cursor:pointer;transition:all .15s;}
.export-btn:hover{border-color:var(--cyan);color:var(--cyan);background:var(--bg3);}
.export-btn.json:hover{border-color:var(--gold);color:var(--gold);}
.export-btn svg{width:14px;height:14px}

.panel{display:none;animation:fadeUp .25s ease}
.panel.active{display:block}

.taxon-section{margin-bottom:10px;border:1px solid var(--border);border-radius:10px;overflow:hidden;background:var(--bg2);transition:border-color .2s}
.taxon-section:hover{border-color:var(--border2);}
.taxon-header{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;background:var(--bg3);cursor:pointer;user-select:none;border-bottom:1px solid var(--border);transition:background .15s}
.taxon-header:hover{background:var(--bg4)}
.taxon-left{display:flex;align-items:center;gap:12px}
.taxon-badge{font-family:var(--mono);font-size:0.68rem;font-weight:500;color:var(--cyan);background:var(--accent-bg);border:1px solid var(--accent-border);padding:3px 10px;border-radius:4px;letter-spacing:.04em;flex-shrink:0}
.taxon-name-wrap{display:flex;flex-direction:column;gap:2px}
.taxon-name{font-size:0.88rem;font-weight:600;color:var(--sand)}
.taxon-collection-name{font-size:0.68rem;color:var(--cyan);font-family:var(--mono);font-weight:500}
.taxon-collection-name.loading{color:var(--text3);font-style:italic}
.taxon-collection-name.error{color:var(--text3)}
.taxon-right{display:flex;align-items:center;gap:20px}
.taxon-stat{text-align:right}
.taxon-stat-val{font-family:var(--mono);font-size:1rem;font-weight:600;color:var(--sand)}
.taxon-stat-lbl{font-size:0.65rem;color:var(--text3);letter-spacing:.06em;text-transform:uppercase;margin-top:1px}
.taxon-chevron{color:var(--text3);transition:transform .2s;font-size:0.7rem}
.taxon-section.open .taxon-chevron{transform:rotate(180deg)}
.taxon-body{display:none}
.taxon-section.open .taxon-body{display:block}

.data-table{width:100%;border-collapse:collapse;font-family:var(--mono);font-size:0.75rem}
.data-table th{padding:9px 18px;text-align:left;color:var(--text3);font-size:0.65rem;letter-spacing:.1em;text-transform:uppercase;border-bottom:1px solid var(--border);background:var(--bg3);font-weight:500}
.data-table th.right{text-align:right}
.data-table td{padding:10px 18px;border-bottom:1px solid var(--border);color:var(--text2);vertical-align:middle}
.data-table td.right{text-align:right}
.data-table tr:last-child td{border-bottom:none}
.data-table tr:hover td{background:rgba(72,202,228,0.03)}
.data-table .rank{color:var(--text3);font-size:0.65rem;width:32px}
.data-table .addr{color:var(--text);font-size:0.75rem}
.data-table .count{color:var(--cyan);font-weight:600;font-size:0.88rem;text-align:right}
.bar-cell{width:140px}
.bar-wrap{background:var(--bg4);border-radius:2px;height:4px;overflow:hidden}
.bar-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--cyan));border-radius:2px;min-width:3px}

.error-box{background:rgba(224,90,90,0.08);border:1px solid rgba(224,90,90,0.3);border-radius:10px;padding:18px 22px;color:var(--red);font-family:var(--mono);font-size:0.82rem;margin-bottom:20px;}
.error-box strong{display:block;margin-bottom:5px;font-size:0.88rem}

footer{margin-top:56px;padding-top:20px;border-top:1px solid var(--border);text-align:center;font-size:0.72rem;color:var(--text3);font-family:var(--mono);}
footer a{color:var(--text2);text-decoration:none;}
footer a:hover{color:var(--cyan);}

@media(max-width:600px){
  .search-row{flex-direction:column}
  .bar-cell{display:none}
  h1{font-size:2rem}
}
</style>
</head>
<body>

<nav>
  <a class="nav-logo" href="https://onledger.net">
    <div class="nav-logo-mark">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
        <polygon points="8,2 14,5.5 14,10.5 8,14 2,10.5 2,5.5" fill="none" stroke="var(--cyan)" stroke-width="1.5"/>
        <circle cx="8" cy="8" r="2" fill="var(--cyan)"/>
      </svg>
    </div>
    onledger.net
  </a>
  <div class="nav-right">
    <div class="nav-badge"><div class="live-dot"></div>XRPL</div>
    <div class="palette-group" id="palette-group">
      <div class="palette-trigger" id="palette-trigger" onclick="togglePaletteDropdown(event)">
        Palette
        <div class="palette-trigger-dot" id="palette-trigger-dot"></div>
        <span class="palette-trigger-arrow">&#9660;</span>
      </div>

<div class="wrap">

    <div class="controls-row">

          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          Export CSV

          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>

<script>
const API = "/xrpl-proxy";
const IPFS_GATEWAY = "https://ipfs.io/ipfs/";
let collectionNames = {};
let lastNfts = [], lastIssuer = "";

// ── Theme system ──────────────────────────────────────────────
const PALETTE_DOTS = {
  fiordland:   '#1B6CA8',
  waitomo:     '#1D9E75',
  kauri:       '#B8842A',
  southernalps:'#7A9BB5'
};

function applyTheme(palette, mode) {
  const t = window._THEMES[palette]?.[mode];
  if (!t) return;
  const root = document.documentElement;
  Object.entries(t).forEach(([k,v]) => root.style.setProperty(k, v));
  root.dataset.palette = palette;
  root.dataset.mode = mode;
  localStorage.setItem('theme', JSON.stringify({ palette, mode }));
  const dot = document.getElementById('palette-trigger-dot');
  if (dot) dot.style.background = PALETTE_DOTS[palette] || 'var(--cyan)';
  const thumb = document.getElementById('mode-thumb');
  if (thumb) thumb.classList.toggle('on', mode === 'light');
  document.querySelectorAll('.palette-option').forEach(el => {
    el.classList.toggle('active', el.dataset.palette === palette);
  });
}

function togglePaletteDropdown(e) {
  e.stopPropagation();
  document.getElementById('palette-dropdown').classList.toggle('open');
}

function selectPalette(palette) {
  const mode = document.documentElement.dataset.mode || 'dark';
  applyTheme(palette, mode);
  document.getElementById('palette-dropdown').classList.remove('open');
}

function toggleMode() {
  const current = document.documentElement.dataset.mode || 'dark';
  const palette = document.documentElement.dataset.palette || 'fiordland';
  applyTheme(palette, current === 'dark' ? 'light' : 'dark');
}

document.addEventListener('click', (e) => {
  const dd = document.getElementById('palette-dropdown');
  if (dd && !document.getElementById('palette-group').contains(e.target)) {
    dd.classList.remove('open');
  }
});

(function initThemeUI() {
  const saved = window._themeSaved || { palette: 'fiordland', mode: 'dark' };
  const dot = document.getElementById('palette-trigger-dot');
  if (dot) dot.style.background = PALETTE_DOTS[saved.palette] || '#48CAE4';
  const thumb = document.getElementById('mode-thumb');
  if (thumb) thumb.classList.toggle('on', saved.mode === 'light');
  document.querySelectorAll('.palette-option').forEach(el => {
    el.classList.toggle('active', el.dataset.palette === saved.palette);
  });
})();

// ── App logic ─────────────────────────────────────────────────
async function withRetry(fn, { retries=3, baseDelay=500, label="" } = {}) {
  let lastErr;
  for (let attempt = 0; attempt <= retries; attempt++) {
    try { return await fn(); }
    catch(e) {
      lastErr = e;
      if (attempt < retries) {
        const delay = baseDelay * Math.pow(2, attempt);
        console.warn(`[${label}] attempt ${attempt+1} failed (${e.message}), retrying in ${delay}ms…`);
        await new Promise(r => setTimeout(r, delay));
      }
    }
  }
  throw lastErr;
}

function hexToUtf8(hex) {
  try {
    const bytes = hex.match(/.{1,2}/g).map(b => parseInt(b, 16));
    return new TextDecoder().decode(new Uint8Array(bytes));
  } catch { return null; }
}

function resolveUri(hex) {
  const raw = hexToUtf8(hex);
  if (!raw) return null;
  if (raw.startsWith("ipfs://")) return IPFS_GATEWAY + raw.slice(7);
  if (raw.startsWith("http://") || raw.startsWith("https://")) return raw;
  if (/^Qm[a-zA-Z0-9]{44}/.test(raw) || /^bafy/.test(raw)) return IPFS_GATEWAY + raw;
  return null;
}

async function fetchCollectionName(uri) {
  try {
    return await withRetry(async () => {
      const resp = await fetch(uri, { signal: AbortSignal.timeout(8000) });
      if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
      const meta = await resp.json();
      return meta.collection?.name
        || meta.collection
        || meta.name?.replace(/#\d+$/, '').replace(/\s*\d+$/, '').trim()
        || meta.symbol
        || null;
    }, { retries: 2, baseDelay: 1000, label: "IPFS" });
  } catch { return null; }
}

async function fetchAllNFTs(issuer) {
  const nfts = []; let marker = null, page = 1;
  while (true) {
    const params = { issuer, limit: 400 };
    if (marker) params.marker = marker;
    const payload = JSON.stringify({ method: "nfts_by_issuer", params: [params] });
    const data = await withRetry(async () => {
      const resp = await fetch(API, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: payload,
        signal: AbortSignal.timeout(15000)
      });
      if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
      return resp.json();
    }, { retries: 3, baseDelay: 500, label: `XRPL page ${page}` });
    const result = data.result || {};
    if (result.error) throw new Error(result.error_message || result.error);
    const batch = result.nfts || [];
    nfts.push(...batch);
    marker = result.marker;
    setProgress(`Fetching page ${page}…`, `${nfts.length} NFTs retrieved`);
    page++;
    if (!marker) break;
  }
  return nfts;
}

async function resolveCollectionNames(nfts, byTaxon) {
  collectionNames = {};
  const taxons = Object.keys(byTaxon);
  await Promise.all(taxons.map(async taxon => {
    const sample = nfts.find(n => n.nft_taxon == taxon && n.uri && !n.is_burned);
    if (!sample) return;
    const url = resolveUri(sample.uri);
    if (!url) return;
    const el = document.getElementById(`cname_${taxon}`);
    if (el) { el.textContent = "resolving…"; el.className = "taxon-collection-name loading"; }
    const name = await fetchCollectionName(url);
    collectionNames[taxon] = name || null;
    if (el) {
      if (name) { el.textContent = name; el.className = "taxon-collection-name"; }
      else { el.textContent = "name unavailable"; el.className = "taxon-collection-name error"; }
    }
  }));
}

async function runLookup() {
  const issuer = document.getElementById("issuerInput").value.trim();
  if (!issuer) { showError("Please enter an issuer address."); return; }
  if (!issuer.startsWith("r") || issuer.length < 25) {
    showError("That doesn't look like a valid XRPL address — it should start with 'r'.");
    return;
  }
  hideError();
  document.getElementById("results").style.display = "none";
  document.getElementById("progressSection").classList.add("visible");
  document.getElementById("searchBtn").disabled = true;
  collectionNames = {};
  try {
    const nfts   = await fetchAllNFTs(issuer);
    const active = nfts.filter(n => !n.is_burned);
    lastNfts = nfts; lastIssuer = issuer;
    setProgress("Processing…", "");
    await new Promise(r => setTimeout(r, 60));
    const byTaxon = {};
    for (const n of active) {
      if (!byTaxon[n.nft_taxon]) byTaxon[n.nft_taxon] = {};
      byTaxon[n.nft_taxon][n.owner] = (byTaxon[n.nft_taxon][n.owner] || 0) + 1;
    }
    renderResults(issuer, nfts, active, byTaxon);
    setProgress("Resolving collection names…", `${Object.keys(byTaxon).length} collections`);
    await resolveCollectionNames(nfts, byTaxon);
    setProgress("Done", "");
  } catch(e) {
    showError(e.message || "Failed to fetch. Please check the address and try again.");
  } finally {
    document.getElementById("progressSection").classList.remove("visible");
    document.getElementById("searchBtn").disabled = false;
  }
}

function renderResults(issuer, nfts, active, byTaxon) {
  document.getElementById("issuerDisplay").textContent = issuer;
  const taxons  = new Set(active.map(n => n.nft_taxon));
  const holders = new Set(active.map(n => n.owner));
  document.getElementById("summaryGrid").innerHTML = `
    <div class="summary-card c-accent"><div class="sc-label">Total Issued</div><div class="sc-value accent">${nfts.length.toLocaleString()}</div></div>
    <div class="summary-card c-green"><div class="sc-label">Active</div><div class="sc-value green">${active.length.toLocaleString()}</div></div>
    <div class="summary-card c-red"><div class="sc-label">Burned</div><div class="sc-value red">${(nfts.length - active.length).toLocaleString()}</div></div>
    <div class="summary-card c-gold"><div class="sc-label">Collections</div><div class="sc-value gold">${taxons.size.toLocaleString()}</div></div>
    <div class="summary-card c-accent"><div class="sc-label">Unique Holders</div><div class="sc-value accent">${holders.size.toLocaleString()}</div></div>`;

  document.getElementById("panel-taxon").innerHTML = Object.keys(byTaxon).sort((a,b) => a-b).map(taxon => {
    const wallets = byTaxon[taxon];
    const total   = Object.values(wallets).reduce((s,c) => s+c, 0);
    const hCount  = Object.keys(wallets).length;
    const maxC    = Math.max(...Object.values(wallets));
    const rows    = Object.entries(wallets).sort((a,b) => b[1]-a[1]).map(([addr, count], i) => `
      <tr>
        <td class="rank">${i+1}</td>
        <td class="addr">${addr}</td>
        <td class="count right">${count}</td>
        <td class="bar-cell"><div class="bar-wrap"><div class="bar-fill" style="width:${Math.round(count/maxC*100)}%"></div></div></td>
      </tr>`).join("");
    return `
      <div class="taxon-section open">
        <div class="taxon-header" onclick="toggleTaxon(this)">
          <div class="taxon-left">
            <span class="taxon-badge">Taxon ${taxon}</span>
            <div class="taxon-name-wrap">
              <span class="taxon-name">Collection #${taxon}</span>
              <span class="taxon-collection-name loading" id="cname_${taxon}">resolving…</span>
            </div>
          </div>
          <div class="taxon-right">
            <div class="taxon-stat"><div class="taxon-stat-val">${total}</div><div class="taxon-stat-lbl">NFTs</div></div>
            <div class="taxon-stat"><div class="taxon-stat-val">${hCount}</div><div class="taxon-stat-lbl">Holders</div></div>
            <span class="taxon-chevron">&#9660;</span>
          </div>
        </div>
        <div class="taxon-body">
          <table class="data-table">
            <thead><tr><th>#</th><th>Wallet</th><th class="right">NFTs</th><th class="bar-cell"></th></tr></thead>
            <tbody>${rows}</tbody>
          </table>
        </div>
      </div>`;
  }).join("");

  const allCounts = {};
  for (const n of active) allCounts[n.owner] = (allCounts[n.owner] || 0) + 1;
  const maxAll = Math.max(...Object.values(allCounts));
  const totalRows = Object.entries(allCounts).sort((a,b) => b[1]-a[1]).map(([addr, count], i) => `
    <tr>
      <td class="rank">${i+1}</td>
      <td class="addr">${addr}</td>
      <td class="count right">${count}</td>
      <td class="bar-cell"><div class="bar-wrap"><div class="bar-fill" style="width:${Math.round(count/maxAll*100)}%"></div></div></td>
    </tr>`).join("");

  document.getElementById("panel-total").innerHTML = `
    <div class="taxon-section open">
      <div class="taxon-body" style="display:block">
        <table class="data-table">
          <thead><tr><th>#</th><th>Wallet</th><th class="right">Total NFTs</th><th class="bar-cell"></th></tr></thead>
          <tbody>${totalRows}</tbody>
        </table>
      </div>
    </div>`;

  document.getElementById("results").style.display = "block";
}

function toggleTaxon(h) { h.closest(".taxon-section").classList.toggle("open"); }
function switchTab(name, btn) {
  document.querySelectorAll(".view-tab").forEach(b => b.classList.remove("active"));
  document.querySelectorAll(".panel").forEach(p => p.classList.remove("active"));
  btn.classList.add("active");
  document.getElementById(`panel-${name}`).classList.add("active");
}
function setProgress(l, c) { document.getElementById("progressLabel").textContent=l; document.getElementById("progressCount").textContent=c; }
function showError(m) { document.getElementById("errorMsg").textContent=m; document.getElementById("errorBox").style.display="block"; }
function hideError()  { document.getElementById("errorBox").style.display="none"; }

function buildExportData() {
  const active = lastNfts.filter(n => !n.is_burned);
  const byTaxon = {}, allCounts = {};
  for (const n of active) {
    if (!byTaxon[n.nft_taxon]) byTaxon[n.nft_taxon] = {};
    byTaxon[n.nft_taxon][n.owner] = (byTaxon[n.nft_taxon][n.owner] || 0) + 1;
    allCounts[n.owner] = (allCounts[n.owner] || 0) + 1;
  }
  return { active, byTaxon, allCounts };
}

function getTs() { return new Date().toISOString().slice(0,19).replace(/[:T]/g,"-"); }
function download(content, filename, type) {
  const blob = new Blob([content], { type });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement("a");
  a.href = url; a.download = filename; a.click();
  URL.revokeObjectURL(url);
}

function exportCSV() {
  if (!lastNfts.length) return;
  const { active, byTaxon, allCounts } = buildExportData();
  const rows = [];
  rows.push(["Issuer", lastIssuer]);
  rows.push(["Total Issued", lastNfts.length]);
  rows.push(["Active", active.length]);
  rows.push(["Burned", lastNfts.length - active.length]);
  rows.push(["Unique Holders", new Set(active.map(n => n.owner)).size]);
  rows.push([]);
  rows.push(["BY COLLECTION (TAXON)"]);
  rows.push(["Taxon", "Collection Name", "Wallet", "NFTs"]);
  for (const taxon of Object.keys(byTaxon).sort((a,b) => a-b)) {
    const name = collectionNames[taxon] || "";
    for (const [addr, count] of Object.entries(byTaxon[taxon]).sort((a,b) => b[1]-a[1]))
      rows.push([taxon, name, addr, count]);
  }
  rows.push([]);
  rows.push(["ALL COLLECTIONS COMBINED"]);
  rows.push(["Wallet", "Total NFTs"]);
  for (const [addr, count] of Object.entries(allCounts).sort((a,b) => b[1]-a[1]))
    rows.push([addr, count]);
  download(rows.map(r => r.map(c => `"${c}"`).join(",")).join("\n"),
    `nft-holders-${lastIssuer.slice(0,8)}-${getTs()}.csv`, "text/csv");
}

function exportJSON() {
  if (!lastNfts.length) return;
  const { active, byTaxon, allCounts } = buildExportData();
  const collections = Object.keys(byTaxon).sort((a,b) => a-b).map(taxon => ({
    taxon:           parseInt(taxon),
    collection_name: collectionNames[taxon] || null,
    total_nfts:      Object.values(byTaxon[taxon]).reduce((s,c) => s+c, 0),
    unique_holders:  Object.keys(byTaxon[taxon]).length,
    holders:         Object.entries(byTaxon[taxon]).sort((a,b) => b[1]-a[1]).map(([wallet, count]) => ({ wallet, nft_count: count }))
  }));
  const output = {
    generated_at:   new Date().toISOString(),
    issuer:         lastIssuer,
    summary: {
      total_issued:   lastNfts.length,
      active:         active.length,
      burned:         lastNfts.length - active.length,
      collections:    collections.length,
      unique_holders: new Set(active.map(n => n.owner)).size
    },
    collections,
    all_holders: Object.entries(allCounts).sort((a,b) => b[1]-a[1]).map(([wallet, total_nfts]) => ({ wallet, total_nfts }))
  };
  download(JSON.stringify(output, null, 2),
    `nft-holders-${lastIssuer.slice(0,8)}-${getTs()}.json`, "application/json");
}

document.getElementById("issuerInput").addEventListener("keydown", e => { if (e.key === "Enter") runLookup(); });
</script>
